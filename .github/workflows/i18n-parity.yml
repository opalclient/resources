name: i18n parity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-i18n-parity.mjs
      # Every content MDX file must compile — a broken file fails the
      # opal.wtf next build at prerender time.
      - run: npm install --prefix scripts/translate
      - run: node scripts/check-mdx-compile.mjs
